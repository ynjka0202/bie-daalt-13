<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <div class="card add-section">
            <input type="text" id="taskTitle" placeholder="Юу хийх вэ?">
            <select id="taskPriority">
                <option value="low">Нам</option>
                <option value="medium" selected>Дунд</option>
                <option value="high">Өндөр</option>
            </select>
            <button onclick="addTask()" class="btn-add">Нэмэх</button>
        </div>

        <div class="filter-bar">
            <div class="btns">
                <button onclick="filterTasks('all')" class="active" id="allBtn">Бүгд</button>
                <button onclick="filterTasks('pending')" id="pendingBtn">⏳</button>
                <button onclick="filterTasks('completed')" id="completedBtn">✅</button>
            </div>
            <div class="stats">
                <span id="taskCount">Нийт: 0</span>
            </div>
        </div>

        <div id="taskList" class="list"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
